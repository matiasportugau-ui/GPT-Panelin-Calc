openapi: "3.1.0"
info:
  title: Calculadora BMC API
  description: Motor programático de cálculo para paneles Panelin — BMC Uruguay. BOM con SKUs reales del catálogo, precios reales, IVA 22%. Fuente única de verdad.
  version: "5.0.0"
servers:
  - url: "https://calculadora-five-sand.vercel.app"
    description: Producción

paths:
  /api/cotizar:
    post:
      operationId: cotizar
      summary: Genera cotización completa con BOM (SKUs reales), precios, IVA 22% y warnings de autoportancia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CotizarRequest'
      responses:
        "200":
          description: Cotización generada. Presentar valores EXACTOS al cliente sin modificar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CotizarResponse'
        "400":
          description: Parámetros inválidos o faltantes. Mostrar error.message al cliente.

  /api/pdf:
    post:
      operationId: generarPDF
      summary: Genera PDF descargable de una cotización
      description: "Acepta 3 formas: (1) cotizacion_id del resultado previo, (2) cotizacion_data completa, (3) los mismos parámetros de /api/cotizar para generar y descargar en un paso."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PDFRequest'
      responses:
        "200":
          description: PDF generado
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /api/productos:
    get:
      operationId: listarProductos
      summary: Lista el catálogo real de familias y espesores disponibles. SIEMPRE usar esto en vez de recitar de memoria.
      responses:
        "200":
          description: Catálogo de productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductosResponse'

  /api/autoportancia:
    get:
      operationId: validarAutoportancia
      summary: Valida luz máxima o devuelve tabla completa. SIEMPRE usar para datos técnicos de luz.
      parameters:
        - name: familia
          in: query
          schema:
            type: string
          example: ISODEC_EPS
        - name: espesor
          in: query
          schema:
            type: number
          example: 100
        - name: luz
          in: query
          schema:
            type: number
          example: 4.5
      responses:
        "200":
          description: Resultado de validación o tabla completa

  /health:
    get:
      operationId: healthCheck
      summary: Estado del servicio
      responses:
        "200":
          description: Servicio activo

components:
  schemas:
    CotizarRequest:
      type: object
      required:
        - escenario
        - familia
        - espesor_mm
        - largo_m
      description: "Se requiere ancho_m O cant_paneles (al menos uno). cant_paneles es útil cuando el cliente dice '10 paneles de 4.5m'."
      properties:
        escenario:
          type: string
          enum: [solo_techo, solo_fachada, techo_fachada, camara_frigorifica]
          description: "solo_techo: cubierta. solo_fachada: paredes. techo_fachada: ambos. camara_frigorifica: techo + 4 paredes (altura fija 3m)."
        familia:
          type: string
          enum: [ISODEC_EPS, ISODEC_PIR, ISOROOF_3G, ISOROOF_FOIL, ISOROOF_PLUS, ISOPANEL_EPS, ISOWALL_PIR, ISOFRIG_PIR]
          description: "Familia de panel. Consultar GET /api/productos para ver espesores disponibles."
        espesor_mm:
          type: number
          description: Espesor del panel en mm.
        ancho_m:
          type: number
          description: "Ancho del área en metros. Alternativo a cant_paneles."
        cant_paneles:
          type: number
          description: "Cantidad de paneles. Alternativo a ancho_m. Usar cuando el cliente dice 'X paneles de Y metros'."
        largo_m:
          type: number
          description: Largo de cada panel en metros.
        lista_precios:
          type: string
          enum: [venta, web]
          default: venta
          description: "venta: precio distribuidor. web: precio publicado en bmcuruguay.com.uy"
        apoyos:
          type: number
          default: 0
          description: "Apoyos intermedios (solo techo). Reduce luz efectiva: luz = largo / (apoyos + 1)"
        tiene_cumbrera:
          type: boolean
          default: false
          description: "true si el techo tiene cumbrera (2 aguas). Agrega la pieza de cumbrera al BOM."
        tiene_canalon:
          type: boolean
          default: false
          description: "true si el techo tiene canalón en el borde inferior. Agrega canalón + soporte al BOM."
        num_aberturas:
          type: number
          default: 0
          description: "Cantidad de puertas/ventanas (solo fachada)."
        estructura:
          type: string
          enum: [metal, hormigon, mixto]
          default: metal
          description: "Tipo de estructura. Afecta fijaciones en fachada (5.5 tornillos/m² para metal/mixto)."
        envio_usd:
          type: number
          description: "Costo de envío en USD. Solo incluir si el cliente lo solicita y ya fue cotizado aparte. Si no se pasa, el envío NO aparece en la respuesta."

    CotizarResponse:
      type: object
      properties:
        ok:
          type: boolean
        cotizacion:
          type: object
          description: Presentar TODOS estos campos al cliente sin omitir ni modificar valores.
          properties:
            cotizacion_id:
              type: string
            fecha:
              type: string
            escenario:
              type: string
            familia:
              type: string
            espesor_mm:
              type: number
            lista_precios:
              type: string
            secciones:
              type: array
              description: "Cada sección: tipo (techo|pared|...), items[] con SKU real, subtotal."
              items:
                type: object
                properties:
                  tipo:
                    type: string
                  cant_paneles:
                    type: number
                  area_m2:
                    type: number
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        sku:
                          type: string
                          description: SKU real del catálogo BMC Uruguay
                        descripcion:
                          type: string
                        cantidad:
                          type: number
                        unidad:
                          type: string
                        precio_unit:
                          type: number
                        subtotal:
                          type: number
                  subtotal:
                    type: number
            resumen:
              type: object
              properties:
                subtotal_sin_iva:
                  type: number
                iva_22:
                  type: number
                total_con_iva:
                  type: number
                moneda:
                  type: string
            warnings:
              type: array
              items:
                type: string
            envio_usd:
              type: number
              description: "Solo presente si se pasó envio_usd en el request."
            nota:
              type: string

    PDFRequest:
      type: object
      description: "Acepta 3 formas: (1) cotizacion_id, (2) cotizacion_data, (3) params de cotización."
      properties:
        cotizacion_id:
          type: string
        cotizacion_data:
          type: object
        escenario:
          type: string
        familia:
          type: string
        espesor_mm:
          type: number
        ancho_m:
          type: number
        cant_paneles:
          type: number
        largo_m:
          type: number
        lista_precios:
          type: string
          default: venta
        apoyos:
          type: number
          default: 0
        tiene_cumbrera:
          type: boolean
          default: false
        tiene_canalon:
          type: boolean
          default: false
        num_aberturas:
          type: number
          default: 0
        estructura:
          type: string
          default: metal
        envio_usd:
          type: number
        cliente:
          type: object
          properties:
            nombre:
              type: string
            celular:
              type: string
            direccion:
              type: string

    ProductosResponse:
      type: object
      properties:
        ok:
          type: boolean
        catalogo:
          type: array
          items:
            type: object
            properties:
              familia:
                type: string
              espesores:
                type: array
                items:
                  type: number
              composicion:
                type: string
              nota:
                type: string
